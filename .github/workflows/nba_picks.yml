name: NBA Picks Daily Report

on:
  schedule:
    - cron: '0 16 * * *'  # 4:00 PM UTC = 12:00 AM PHT
  workflow_dispatch:        # Manual trigger for testing

jobs:
  run-picks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run picks automation
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          APIFY_API_KEY: ${{ secrets.APIFY_API_KEY }}
          GMAIL_SENDER: ${{ secrets.GMAIL_SENDER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          REPORT_RECIPIENT: ${{ secrets.REPORT_RECIPIENT }}
          EV_CHANNEL_ID: ${{ secrets.EV_CHANNEL_ID }}
          DAFT_CHANNEL_ID: ${{ secrets.DAFT_CHANNEL_ID }}
          HTTP_PROXY_URL: ${{ secrets.HTTP_PROXY_URL }}
        run: python main.py
